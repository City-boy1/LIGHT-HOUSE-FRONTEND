<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Lighthouse Church</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0d2b52;
            --navy-dark: #081a35;
            --gold: #b89240;
            --gold-light: #d4af60;
            --white: #fff;
            --error: #e74c3c;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Lato', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 60%, #1a4a8a 100%);
            padding: 16px;
            overflow-x: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 56px 48px;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            color: var(--gold);
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--white);
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        input {
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--navy-dark);
            font-family: var(--font-heading);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(184, 146, 64, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(184, 146, 64, 0.5);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--error);
            color: #ff8a80;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 36px 24px;
                border-radius: 16px;
            }

            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-icon">✦</div>
        <h1>ADMIN LOGIN</h1>
        <p class="subtitle">LIGHTHOUSE CHURCH · MANAGEMENT PORTAL</p>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="admin@lighthousechurch.org" autocomplete="email" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password"
                autocomplete="current-password" />
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
        <div class="error-msg" id="errorMsg"></div>
        <a href="../index.html" class="back-link">← Back to Church Website</a>
    </div>

    <script>
        // If already logged in, go to dashboard
        if (localStorage.getItem('church_token')) {
            window.location.href = 'dashboard.html';
        }

        const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000/api'
            : 'https://light-house-backend.onrender.com/api';

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if (!email || !password) { showError('Please enter your email and password.'); return; }

            btn.textContent = 'Signing in...'; btn.disabled = true; err.style.display = 'none';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('church_token', data.token);
                    localStorage.setItem('church_admin', JSON.stringify(data.admin));
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error || 'Login failed. Check your credentials.');
                }
            } catch (e) {
                showError('Cannot connect to server. Please ensure the backend is running.');
            } finally {
                btn.textContent = 'Sign In'; btn.disabled = false;
            }
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            err.textContent = msg; err.style.display = 'block';
        }
    </script>
</body>

</html>
